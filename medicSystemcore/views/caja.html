<style>
    .caja-wrapper { padding: 25px; animation: fadeIn 0.5s ease; }
    .caja-nav { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; padding-bottom: 15px; border-bottom: 1px solid #e2e8f0; }
    .caja-grid { display: grid; grid-template-columns: 380px 1fr; gap: 25px; align-items: start; }
    
    /* Tarjetas de Información */
    .info-card { background: white; padding: 20px; border-radius: 16px; box-shadow: 0 4px 20px rgba(0,0,0,0.03); border: 1px solid #eef2f6; }
    .system-card { border-left: 6px solid #4f46e5; } 
    .user-card { border-left: 6px solid #0ea5e9; }   
    
    /* Grid de Billetes */
    .billetes-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 12px; margin-top: 15px; max-height: 400px; overflow-y: auto; padding-right: 5px; }
    .billete-item { background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 12px; padding: 10px; display: flex; flex-direction: column; align-items: center; transition: all 0.2s; }
    .billete-item:focus-within { border-color: #0ea5e9; background: #f0f9ff; box-shadow: 0 0 0 3px rgba(14, 165, 233, 0.1); }
    .billete-label { font-size: 0.65rem; font-weight: 800; color: #94a3b8; margin-bottom: 4px; text-transform: uppercase; }
    .billete-input-group { display: flex; align-items: center; gap: 8px; }
    .billete-input-group span { font-weight: 800; color: #1e293b; font-size: 1rem; }
    .billete-item input { width: 65px; border: 1px solid #cbd5e1; border-radius: 6px; padding: 5px; text-align: center; font-weight: bold; font-size: 1rem; background: white; }
    .subtotal-billete { margin-top: 5px; font-size: 0.8rem; color: #64748b; font-weight: 700; }

    /* Inputs de Auditoría Real (Vouchers) */
    .real-input-group { background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 12px; padding: 12px; margin-top: 10px; }
    .real-input-item { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
    .real-input-item label { font-size: 0.75rem; font-weight: 700; color: #475569; }
    .real-input-item input { width: 100px; border: 1px solid #cbd5e1; border-radius: 6px; padding: 4px 8px; text-align: right; font-weight: bold; }

    /* Listado de Vouchers */
    .voucher-list { max-height: 200px; overflow-y: auto; background: #f1f5f9; border-radius: 12px; border: 1px solid #e2e8f0; margin-top: 10px; }
    
    /* Caja de Cuadre Final */
    .cuadre-box { padding: 20px; border-radius: 16px; text-align: center; margin-top: 20px; transition: all 0.3s; border: 2px solid transparent; }
    .cuadre-normal { background: #f8fafc; color: #475569; border-color: #e2e8f0; }
    .cuadre-ok { background: #f0fdf4; color: #15803d; border-color: #4ade80; }
    .cuadre-error { background: #fef2f2; color: #b91c1c; border-color: #f87171; }
    .cuadre-sobrante { background: #eff6ff; color: #1e40af; border-color: #60a5fa; }

    .btn-back { background: white; border: 1px solid #e2e8f0; padding: 8px 16px; border-radius: 10px; cursor: pointer; display: flex; align-items: center; gap: 8px; font-weight: 600; color: #64748b; transition: 0.2s; }
    
    textarea.notas-caja { width: 100%; border-radius: 12px; border: 1px solid #e2e8f0; padding: 12px; font-family: inherit; font-size: 0.85rem; resize: none; margin-top: 10px; outline: none; transition: 0.2s; }
    textarea.notas-caja:focus { border-color: #0ea5e9; box-shadow: 0 0 0 3px rgba(14, 165, 233, 0.1); }
</style>

<div id="caja-main-container" class="caja-wrapper">
    <div class="caja-nav">
        <button onclick="window.router.load('dashboard')" 
    style="background: #4f46e5; color: white; border: none; width: 50px; height: 50px; border-radius: 14px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.3s ease; box-shadow: 0 4px 10px rgba(79, 70, 229, 0.3);"
    onmouseover="this.style.transform='translateY(-2px)';" 
    onmouseout="this.style.transform='translateY(0)';"
    title="Regresar al Dashboard">
    <i class="fas fa-arrow-left" style="font-size: 1.2rem;"></i>
</button>
        <h2 style="margin:0; font-weight: 800; color: #1e293b;">ARQUEO DE CAJA</h2>
        <div id="fecha-label" style="color: #64748b; font-weight: 600;"></div>
    </div>

    <div class="caja-grid" id="caja-principal-grid">
        <div class="info-card system-card">
            <h3 style="color: #4f46e5; font-size: 1.1rem; margin-top:0;"><i class="fas fa-laptop-code"></i> Reporte del Sistema</h3>
            
            <div style="margin: 15px 0; display: flex; flex-direction: column; gap: 10px;">
                <div style="display:flex; justify-content:space-between; padding-bottom: 5px; border-bottom: 1px dashed #e2e8f0;">
                    <span>Efectivo ventas:</span><strong id="sis-efectivo">$0.00</strong>
                </div>
                <div style="display:flex; justify-content:space-between; padding-bottom: 5px; border-bottom: 1px dashed #e2e8f0;">
                    <span>Transferencias:</span><strong id="sis-trans">$0.00</strong>
                </div>
                <div style="display:flex; justify-content:space-between; padding-bottom: 5px; border-bottom: 1px dashed #e2e8f0;">
                    <span>Tarjeta:</span><strong id="sis-tarjeta">$0.00</strong>
                </div>
            </div>

            <h4 style="margin: 20px 0 5px 0; font-size: 0.7rem; color: #94a3b8; text-transform: uppercase; letter-spacing: 0.5px;">Vouchers y Pagos Electrónicos</h4>
            <div class="voucher-list" id="lista-vouchers">
                </div>

            <div style="background: #1e293b; color: white; padding: 20px; border-radius: 12px; margin-top: 25px; text-align: center; box-shadow: 0 4px 12px rgba(30, 41, 59, 0.2);">
                <small style="opacity: 0.7; font-size: 0.7rem; text-transform: uppercase; font-weight: 700;">Total Bruto en Sistema</small>
                <h2 id="total-sistema" style="margin: 5px 0 0 0; font-size: 1.8rem; letter-spacing: -1px;">$0.00</h2>
            </div>
        </div>

        <div class="info-card user-card">
            <div style="display:flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
                <h3 style="margin:0; font-size: 1.1rem; color: #0ea5e9;"><i class="fas fa-cash-register"></i> Desglose Físico</h3>
                <div style="display: flex; gap: 12px; align-items: center; background: #f1f5f9; padding: 8px 15px; border-radius: 10px;">
                    <label style="font-size: 0.7rem; font-weight: 800; color: #64748b;">FONDO INICIAL:</label>
                    <input type="number" id="input-inicial" value="0.00" step="0.01" oninput="window.cajaModule.calcularDiferenciaGlobal()" style="width: 80px; background: transparent; border: none; border-bottom: 2px solid #cbd5e1; text-align: right; font-weight: 800; font-size: 1rem; color: #1e293b; outline: none;">
                </div>
            </div>

            <div class="billetes-grid" id="billetes-container">
                </div>

            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 15px;">
                <div class="real-input-group">
                    <div class="real-input-item">
                        <label>VOUCHERS TRANSF.</label>
                        <input type="number" id="real-trans" value="0.00" step="0.01" oninput="window.cajaModule.calcularDiferenciaGlobal()">
                    </div>
                </div>
                <div class="real-input-group">
                    <div class="real-input-item">
                        <label>VOUCHERS TARJETA</label>
                        <input type="number" id="real-tarjeta" value="0.00" step="0.01" oninput="window.cajaModule.calcularDiferenciaGlobal()">
                    </div>
                </div>
            </div>

            <div style="margin-top: 15px;">
                <label style="font-size: 0.7rem; font-weight: 800; color: #94a3b8; text-transform: uppercase;">Notas u Observaciones del Arqueo</label>
                <textarea id="notas-arqueo" class="notas-caja" placeholder="Escribe aquí si hubo algún descuadre, faltante o novedad..." rows="2"></textarea>
            </div>

            <div class="cuadre-box cuadre-normal" id="cuadre-result-box">
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
                    <div>
                        <span style="font-size: 0.7rem; font-weight: 800; opacity: 0.7; text-transform: uppercase;">Total Físico (Efe+Vouc)</span>
                        <h2 id="display-fisico" style="margin:5px 0 0 0; font-size: 1.6rem;">$0.00</h2>
                    </div>
                    <div>
                        <span style="font-size: 0.7rem; font-weight: 800; opacity: 0.7; text-transform: uppercase;">Diferencia Total</span>
                        <h2 id="diferencia-total" style="margin:5px 0 0 0; font-size: 1.6rem;">$0.00</h2>
                    </div>
                </div>
            </div>

            <button id="btn-registrar-arqueo" style="margin-top: 25px; width: 100%; padding: 20px; background: #1e293b; color: white; border-radius: 14px; font-weight: 800; border: none; cursor: pointer; transition: all 0.2s; font-size: 1rem; letter-spacing: 1px; box-shadow: 0 4px 15px rgba(0,0,0,0.1);" onclick="window.cajaModule.confirmarCierre()">
                <i class="fas fa-lock"></i> REGISTRAR ARQUEO Y CERRAR TURNO
            </button>
        </div>
    </div>
</div>
